<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俄罗斯方块</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .game-container {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  canvas {
    border: 2px solid #444;
    border-radius: 4px;
    background: #0f0f23;
  }
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 160px;
  }
  .panel-box {
    background: #16213e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .panel-box h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #888;
    margin-bottom: 8px;
  }
  .panel-box .value {
    font-size: 28px;
    font-weight: bold;
    color: #e94560;
  }
  #next-canvas {
    border: none;
    background: transparent;
    display: block;
    margin: 0 auto;
  }
  .controls {
    font-size: 11px;
    color: #666;
    line-height: 1.8;
  }
  .controls kbd {
    background: #2a2a4a;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid #444;
    font-family: monospace;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
    z-index: 10;
  }
  .overlay-content {
    text-align: center;
  }
  .overlay-content h1 {
    font-size: 36px;
    margin-bottom: 12px;
    color: #e94560;
  }
  .overlay-content p {
    font-size: 16px;
    color: #aaa;
  }
  .overlay-content .final-score {
    font-size: 48px;
    font-weight: bold;
    color: #e94560;
    margin: 12px 0;
  }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="game-container">
  <div style="position:relative">
    <canvas id="board" width="300" height="600"></canvas>
    <div id="overlay-start" class="overlay">
      <div class="overlay-content">
        <h1>俄罗斯方块</h1>
        <p>按任意键开始</p>
      </div>
    </div>
    <div id="overlay-pause" class="overlay hidden">
      <div class="overlay-content">
        <h1>暂停</h1>
        <p>按 <kbd>P</kbd> 继续</p>
      </div>
    </div>
    <div id="overlay-gameover" class="overlay hidden">
      <div class="overlay-content">
        <h1>游戏结束</h1>
        <div class="final-score" id="final-score">0</div>
        <p>按任意键重新开始</p>
      </div>
    </div>
  </div>
  <div class="side-panel">
    <div class="panel-box">
      <h3>分数</h3>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel-box">
      <h3>等级</h3>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel-box">
      <h3>行数</h3>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel-box">
      <h3>下一个</h3>
      <canvas id="next-canvas" width="120" height="120"></canvas>
    </div>
    <div class="panel-box controls">
      <kbd>←</kbd><kbd>→</kbd> 移动<br>
      <kbd>↑</kbd> 旋转<br>
      <kbd>↓</kbd> 加速<br>
      <kbd>Space</kbd> 硬降<br>
      <kbd>P</kbd> 暂停
    </div>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20, BLOCK = 30;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

const COLORS = ['#00f0f0','#f0f000','#a000f0','#00f000','#f00000','#0000f0','#f0a000'];
const SHAPES = [
  [[1,1,1,1]],                          // I
  [[1,1],[1,1]],                         // O
  [[0,1,0],[1,1,1]],                     // T
  [[0,1,1],[1,1,0]],                     // S
  [[1,1,0],[0,1,1]],                     // Z
  [[1,0,0],[1,1,1]],                     // J
  [[0,0,1],[1,1,1]]                      // L
];

const LINE_SCORES = [0, 100, 300, 500, 800];

let board, score, level, lines, currentPiece, nextPiece;
let dropInterval, dropTimer, lastTime;
let gameState = 'start'; // start, playing, paused, gameover

function createBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function newPiece(shapeIdx) {
  const shape = SHAPES[shapeIdx];
  return {
    shape: shape.map(r => [...r]),
    color: shapeIdx + 1,
    x: Math.floor((COLS - shape[0].length) / 2),
    y: 0
  };
}

function randomPiece() {
  return newPiece(Math.floor(Math.random() * SHAPES.length));
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const rotated = Array.from({length: cols}, () => Array(rows).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      rotated[c][rows - 1 - r] = shape[r][c];
  return rotated;
}

function valid(piece, offX = 0, offY = 0, shape) {
  const s = shape || piece.shape;
  for (let r = 0; r < s.length; r++)
    for (let c = 0; c < s[r].length; c++)
      if (s[r][c]) {
        const nx = piece.x + c + offX;
        const ny = piece.y + r + offY;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && board[ny][nx]) return false;
      }
  return true;
}

function lock() {
  const s = currentPiece.shape;
  for (let r = 0; r < s.length; r++)
    for (let c = 0; c < s[r].length; c++)
      if (s[r][c]) {
        const ny = currentPiece.y + r;
        if (ny < 0) { gameOver(); return; }
        board[ny][currentPiece.x + c] = currentPiece.color;
      }
  clearLines();
  currentPiece = nextPiece;
  nextPiece = randomPiece();
  if (!valid(currentPiece)) gameOver();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== 0)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
      cleared++;
      r++; // re-check same row
    }
  }
  if (cleared > 0) {
    score += LINE_SCORES[cleared] * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(50, 1000 - (level - 1) * 80);
    updateUI();
  }
}

function gameOver() {
  gameState = 'gameover';
  document.getElementById('final-score').textContent = score;
  document.getElementById('overlay-gameover').classList.remove('hidden');
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
}

function drawBlock(context, x, y, colorIdx, size = BLOCK) {
  const color = COLORS[colorIdx - 1];
  context.fillStyle = color;
  context.fillRect(x * size, y * size, size, size);
  // highlight
  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.fillRect(x * size, y * size, size, 2);
  context.fillRect(x * size, y * size, 2, size);
  // shadow
  context.fillStyle = 'rgba(0,0,0,0.2)';
  context.fillRect(x * size + size - 2, y * size, 2, size);
  context.fillRect(x * size, y * size + size - 2, size, 2);
  // grid line
  context.strokeStyle = 'rgba(0,0,0,0.3)';
  context.strokeRect(x * size, y * size, size, size);
}

function drawGhost() {
  let ghostY = currentPiece.y;
  while (valid(currentPiece, 0, ghostY - currentPiece.y + 1)) ghostY++;
  const s = currentPiece.shape;
  ctx.globalAlpha = 0.2;
  for (let r = 0; r < s.length; r++)
    for (let c = 0; c < s[r].length; c++)
      if (s[r][c])
        drawBlock(ctx, currentPiece.x + c, ghostY + r, currentPiece.color);
  ctx.globalAlpha = 1;
}

function draw() {
  // clear
  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      ctx.strokeRect(c * BLOCK, r * BLOCK, BLOCK, BLOCK);
  // board
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) drawBlock(ctx, c, r, board[r][c]);
  // ghost + current piece
  if (currentPiece) {
    drawGhost();
    const s = currentPiece.shape;
    for (let r = 0; r < s.length; r++)
      for (let c = 0; c < s[r].length; c++)
        if (s[r][c])
          drawBlock(ctx, currentPiece.x + c, currentPiece.y + r, currentPiece.color);
  }
  // next piece
  nextCtx.fillStyle = '#16213e';
  nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (nextPiece) {
    const s = nextPiece.shape;
    const bSize = 25;
    const ox = Math.floor((120 - s[0].length * bSize) / 2);
    const oy = Math.floor((120 - s.length * bSize) / 2);
    for (let r = 0; r < s.length; r++)
      for (let c = 0; c < s[r].length; c++)
        if (s[r][c]) {
          const color = COLORS[nextPiece.color - 1];
          nextCtx.fillStyle = color;
          nextCtx.fillRect(ox + c * bSize, oy + r * bSize, bSize, bSize);
          nextCtx.strokeStyle = 'rgba(0,0,0,0.3)';
          nextCtx.strokeRect(ox + c * bSize, oy + r * bSize, bSize, bSize);
        }
  }
}

function drop() {
  if (valid(currentPiece, 0, 1)) {
    currentPiece.y++;
  } else {
    lock();
  }
}

function hardDrop() {
  while (valid(currentPiece, 0, 1)) {
    currentPiece.y++;
    score += 2;
  }
  lock();
  updateUI();
}

function moveLeft() {
  if (valid(currentPiece, -1, 0)) currentPiece.x--;
}

function moveRight() {
  if (valid(currentPiece, 1, 0)) currentPiece.x++;
}

function rotatePiece() {
  const rotated = rotate(currentPiece.shape);
  // wall kick: try offsets 0, -1, +1, -2, +2
  for (const off of [0, -1, 1, -2, 2]) {
    if (valid(currentPiece, off, 0, rotated)) {
      currentPiece.shape = rotated;
      currentPiece.x += off;
      return;
    }
  }
}

function startGame() {
  board = createBoard();
  score = 0; level = 1; lines = 0;
  dropInterval = 1000; dropTimer = 0;
  currentPiece = randomPiece();
  nextPiece = randomPiece();
  gameState = 'playing';
  updateUI();
  document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function gameLoop(time) {
  if (gameState !== 'playing') return;
  const delta = time - lastTime;
  lastTime = time;
  dropTimer += delta;
  if (dropTimer >= dropInterval) {
    drop();
    dropTimer = 0;
  }
  draw();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  if (gameState === 'start' || gameState === 'gameover') {
    startGame();
    return;
  }
  if (e.code === 'KeyP') {
    if (gameState === 'playing') {
      gameState = 'paused';
      document.getElementById('overlay-pause').classList.remove('hidden');
    } else if (gameState === 'paused') {
      gameState = 'playing';
      document.getElementById('overlay-pause').classList.add('hidden');
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }
    return;
  }
  if (gameState !== 'playing') return;
  switch (e.code) {
    case 'ArrowLeft': case 'KeyA': moveLeft(); break;
    case 'ArrowRight': case 'KeyD': moveRight(); break;
    case 'ArrowDown': case 'KeyS': drop(); score += 1; updateUI(); break;
    case 'ArrowUp': case 'KeyW': rotatePiece(); break;
    case 'Space': hardDrop(); break;
  }
  e.preventDefault();
  draw();
});

// Initial draw
draw();
</script>
</body>
</html>
